<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CipherOptics 管理后台</title>
  <style>
    :root { --accent: #7c3aed; --bg: #0f0f1a; --card: #1a1a2e; --text: #e0d7ff; --sub: rgba(255,255,255,0.5); }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 24px; min-height: 100vh; }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    .sub { color: var(--sub); font-size: 0.85rem; margin-bottom: 24px; }
    .toolbar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
    input, select, button { font: inherit; padding: 8px 14px; border-radius: 8px; border: 1.5px solid rgba(255,255,255,0.12); background: var(--card); color: var(--text); }
    button { background: var(--accent); border-color: transparent; cursor: pointer; font-weight: 600; }
    button:hover { opacity: 0.85; }
    button.secondary { background: rgba(255,255,255,0.08); }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th { text-align: left; padding: 10px 12px; background: rgba(255,255,255,0.05); color: var(--sub); font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.08); }
    td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: top; max-width: 200px; word-break: break-all; }
    tr:hover td { background: rgba(255,255,255,0.03); }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.72rem; font-weight: 700; }
    .badge-pending { background: rgba(234,179,8,0.2); color: #fbbf24; }
    .badge-sent    { background: rgba(34,197,94,0.2);  color: #4ade80; }
    .badge-paid    { background: rgba(59,130,246,0.2);  color: #60a5fa; }
    .icons-cell { font-size: 0.75rem; color: var(--sub); line-height: 1.6; }
    #msg { color: var(--sub); padding: 40px; text-align: center; }
    .count { color: var(--sub); font-size: 0.85rem; }
  </style>
</head>
<body>
<h1>CipherOptics 管理后台</h1>
<p class="sub">查看订单 · 导出 CSV · 更新状态 · <a href="/debug/index.html" style="color:#a78bfa;text-decoration:none" target="_blank">🗺 落地页 Debug</a></p>

<div class="toolbar">
  <input type="password" id="secret" placeholder="ADMIN_SECRET（可选）" style="width:220px">
  <select id="status-filter">
    <option value="">全部订单</option>
    <option value="pending" selected>待处理 (pending)</option>
    <option value="sent">已发货 (sent)</option>
    <option value="paid">已付款 (paid)</option>
  </select>
  <button onclick="loadOrders()">🔍 查询</button>
  <button class="secondary" onclick="exportCSV()">⬇ 导出 CSV</button>
  <span class="count" id="count"></span>
</div>

<div id="msg">输入 ADMIN_SECRET 并点击查询…</div>
<div style="overflow-x:auto">
  <table id="table" style="display:none">
    <thead>
      <tr>
        <th>时间</th><th>Email</th><th>主题</th><th>多面体</th>
        <th>标题</th><th>图标配置</th><th>状态</th><th>改状态</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
const BASE = window.location.origin;
let rows = [];

const $ = id => document.getElementById(id);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const secret = () => $('secret').value.trim();

function formatIcons(raw) {
  try {
    const obj = typeof raw === 'string' ? JSON.parse(raw) : raw;
    return Object.entries(obj||{}).map(([k,v]) => `面${+k+1}: ${v}`).join('<br>');
  } catch { return esc(JSON.stringify(raw)); }
}

function badgeHtml(s) { return `<span class="badge badge-${s||'pending'}">${s||'pending'}</span>`; }

async function loadOrders() {
  $('msg').textContent = '加载中…'; $('msg').style.display='block'; $('table').style.display='none';
  const status = $('status-filter').value;
  const params = new URLSearchParams({ secret: secret() });
  if (status) params.set('status', status);

  try {
    const res = await fetch(`${BASE}/api/export-orders?${params}`);
    if (res.status === 401) { $('msg').textContent = '❌ 密钥错误'; return; }
    const text = await res.text();
    rows = parseCSV(text);

    $('count').textContent = `共 ${rows.length} 条`;
    $('msg').style.display = 'none';

    if (!rows.length) { $('msg').textContent = '暂无订单'; $('msg').style.display='block'; return; }

    $('tbody').innerHTML = rows.map(r => `
      <tr>
        <td>${esc((r.created_at||'').slice(0,16).replace('T',' '))}</td>
        <td>${esc(r.email)}</td>
        <td>${esc(r.theme)}</td>
        <td>${esc(r.polygon_type)}</td>
        <td>${esc(r.title)}</td>
        <td class="icons-cell">${formatIcons(r.face_icons)}</td>
        <td>${badgeHtml(r.status)}</td>
        <td>
          <select onchange="updateStatus('${esc(r.id)}', this.value)" style="font-size:.75rem;padding:4px 8px">
            <option value="">—</option>
            <option value="pending">pending</option>
            <option value="paid">paid</option>
            <option value="sent">sent</option>
          </select>
        </td>
      </tr>`).join('');
    $('table').style.display = 'table';
  } catch(e) { $('msg').textContent = '请求失败: ' + e.message; }
}

async function updateStatus(id, status) {
  if (!status) return;
  const res = await fetch(`${BASE}/api/update-order`, {
    method: 'POST',
    headers: { 'Content-Type':'application/json', Authorization:`Bearer ${secret()}` },
    body: JSON.stringify({ id, status }),
  });
  const data = await res.json();
  if (data.success) { alert(`✓ 已更新为 ${status}`); loadOrders(); }
  else alert('失败: ' + data.error);
}

function exportCSV() {
  const status = $('status-filter').value;
  const params = new URLSearchParams({ secret: secret() });
  if (status) params.set('status', status);
  window.open(`${BASE}/api/export-orders?${params}`);
}

// Minimal CSV parser
function parseCSV(text) {
  const lines = text.replace(/^﻿/, '').split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = parseLine(lines[0]);
  return lines.slice(1).map(l => {
    const vals = parseLine(l);
    return Object.fromEntries(headers.map((h,i) => [h, vals[i]??'']));
  });
}
function parseLine(line) {
  const out = []; let cur = '', q = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { if (q && line[i+1]==='"') { cur+='"'; i++; } else q=!q; }
    else if (c === ',' && !q) { out.push(cur); cur=''; }
    else cur += c;
  }
  out.push(cur); return out;
}
</script>
</body>
</html>
