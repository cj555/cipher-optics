<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>付款成功 - 正在下载超清原图</title>
  <style>
    body { background-color: #0d0d0d; color: #fff; font-family: sans-serif; text-align: center; padding: 50px 20px; }
    .card { background: #1a1a1a; max-width: 450px; margin: 0 auto; padding: 40px 20px; border-radius: 16px; border: 1px solid #222; }
    .icon { color: #24b47e; font-size: 48px; margin-bottom: 20px; }
    h2 { font-weight: 600; margin-bottom: 12px; }
    p { color: #888; font-size: 0.95rem; line-height: 1.5; margin-bottom: 25px; }
    .loader { border: 3px solid #333; border-top: 3px solid #635bff; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #hidden-engine { display: none; }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon">✓</div>
    <h2>感谢您的支持！</h2>
    <p id="status-text">正在从安全网关安全提取您的印刷级无损矢量原图，请勿关闭窗口...</p>
    <div class="loader" id="status-loader"></div>
  </div>

<iframe id="hidden-engine" src="index.html"></iframe>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      // 获取 Stripe 透传回来的自定义引用参数
      const clientRef = urlParams.get('client_reference_id');

      if (!clientRef) {
        document.getElementById('status-text').innerText = "未检测到有效定制凭证，请联系客服处理。";
        document.getElementById('status-loader').style.display = 'none';
        return;
      }

      // 解析混淆的定制文本
      let rawText = "";
      try {
        rawText = decodeURIComponent(atob(clientRef));
      } catch (e) {
        console.error("参数解析有误", e);
      }

      const iframe = document.getElementById('hidden-engine');
      
      // 等待隐藏的内联核心引擎加载完毕，直接调用其组件方法进行 HD 合成下载
      iframe.onload = function() {
        const engineWindow = iframe.contentWindow;
        
        // 动态等待 iframe 内部雪碧图 fetch 完毕的微小延迟
        setTimeout(() => {
          if (engineWindow && typeof engineWindow.pureFrontendDownloadTrigger === 'function') {
            // 核心安全越壁下载：isHighRes 传入 true，不加任何明文水印与 CSS 噪点滤镜
            engineWindow.pureFrontendDownloadTrigger({ isHighRes: true, text: rawText });
            
            document.getElementById('status-text').innerHTML = `您的 <b>HD 无损矢量图 (.svg)</b> 已成功触发自动下载！<br>您可以直接将此文件提交给 Printful / Printify 等印厂制作衣服。`;
            document.getElementById('status-loader').style.display = 'none';
          }
        }, 800);
      };
    });
  </script>
</body>
</html>
