<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d2b">
  <title>下载你的作品 — CipherOptics</title>
  <link rel="stylesheet" href="/src/styles.css">
  <style>
    .success-wrap {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100dvh; padding: 24px;
      text-align: center; gap: 20px;
    }
    .success-icon { font-size: 3rem; }
    .success-title { font-size: 1.5rem; font-weight: 800; color: var(--theme-title); }
    .success-sub { font-size: 0.9rem; color: rgba(255,255,255,0.55); }
    .preview-canvas {
      width: 100%; max-width: 320px; border-radius: 16px;
      overflow: hidden; background: rgba(255,255,255,0.05);
      aspect-ratio: 1;
    }
    .preview-canvas canvas { width: 100%; height: 100%; display: block; }
    .dl-btn {
      width: 100%; max-width: 320px;
      padding: 16px; border-radius: 16px;
      background: var(--theme-accent); color: #fff;
      font-size: 1rem; font-weight: 700;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      cursor: pointer; text-decoration: none;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: 0.28s ease;
    }
    .dl-btn:hover { opacity: 0.9; }
    .home-link {
      font-size: 0.85rem; color: rgba(255,255,255,0.45);
      text-decoration: none;
    }
    .home-link:hover { color: rgba(255,255,255,0.7); }
    .generating { color: rgba(255,255,255,0.5); font-size: 0.875rem; }
  </style>
</head>
<body>
<div class="success-wrap">
  <div class="success-icon">✨</div>
  <h1 class="success-title">付款成功！</h1>
  <p class="success-sub">正在生成你的专属高清图片...</p>

  <div class="preview-canvas" id="preview-wrap">
    <p class="generating" style="padding:40px 20px">生成中...</p>
  </div>

  <a class="dl-btn" id="dl-btn" style="display:none" href="#">
    ⬇ 下载高清图片 (WebP)
  </a>
  <a class="home-link" href="/">← 返回首页</a>
</div>

<script src="/src/config.js"></script>
<script src="/src/icons.js"></script>
<script>
(async () => {
  // Retrieve order from sessionStorage (set before Stripe redirect)
  const raw = localStorage.getItem('pendingOrder') || sessionStorage.getItem('pendingOrder');
  if (!raw) {
    document.querySelector('.success-sub').textContent = '找不到订单信息，请返回重试。';
    return;
  }

  const order = JSON.parse(raw);
  localStorage.removeItem('pendingOrder');
  sessionStorage.removeItem('pendingOrder');

  // Apply theme
  const theme = CONFIG.themes[order.theme];
  if (theme) {
    document.documentElement.style.setProperty('--theme-bg', theme.polygonColor);
    document.documentElement.style.setProperty('--theme-accent', theme.accentColor);
    document.documentElement.style.setProperty('--theme-title', theme.titleColor);
    document.documentElement.style.setProperty('--theme-glow', theme.glowColor);
    document.body.style.background = theme.polygonColor;
  }

  const poly = CONFIG.polygons[order.polygon];
  const W = CONFIG.image.previewWidth;
  const H = CONFIG.image.previewHeight;

  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // Background
  const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W*0.7);
  grad.addColorStop(0, lighten(theme.polygonColor, 20));
  grad.addColorStop(1, theme.polygonColor);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Glow
  const glow = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W*0.4);
  glow.addColorStop(0, hexRgba(theme.glowColor, 0.18));
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);

  // Title
  ctx.font = `bold ${W*0.065}px -apple-system, sans-serif`;
  ctx.fillStyle = theme.titleColor;
  ctx.textAlign = 'center';
  ctx.fillText(order.title || 'CipherOptics', W/2, W*0.1);

  // Face icons grid
  const faceCount = poly.faces;
  const cols = Math.ceil(Math.sqrt(faceCount));
  const rows = Math.ceil(faceCount / cols);
  const cellW = W * 0.62 / cols;
  const cellH = H * 0.62 / rows;
  const startX = W * 0.19;
  const startY = H * 0.2;

  for (let i = 0; i < faceCount; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const x = startX + col * cellW;
    const y = startY + row * cellH;
    const iconId = order.faceIcons[i] || order.faceIcons[String(i)];
    if (!iconId) continue;

    const faceColor = theme.faceColors[i % theme.faceColors.length];
    const iconCanvas = await renderIconToCanvas(iconId, Math.floor(cellW * 0.8), faceColor, '#ffffff');

    roundRect(ctx, x + cellW*0.1, y + cellH*0.1, cellW*0.8, cellH*0.8, 16);
    ctx.fillStyle = faceColor;
    ctx.fill();
    ctx.drawImage(iconCanvas, x + cellW*0.15, y + cellH*0.15, cellW*0.7, cellH*0.7);
  }

  // Watermark
  ctx.font = `${W*0.022}px -apple-system, sans-serif`;
  ctx.fillStyle = hexRgba(theme.titleColor, 0.3);
  ctx.textAlign = 'center';
  ctx.fillText('CipherOptics.com', W/2, H*0.95);

  // Detect WebP support (Safari/iOS doesn't support WebP canvas export)
  const testCanvas = document.createElement('canvas');
  testCanvas.width = 1; testCanvas.height = 1;
  const supportsWebP = testCanvas.toDataURL('image/webp').startsWith('data:image/webp');
  const fmt = supportsWebP ? 'image/webp' : 'image/png';
  const ext = supportsWebP ? 'webp' : 'png';
  const url = canvas.toDataURL(fmt, CONFIG.image.quality);

  // Show preview as <img> so iOS can long-press to save
  const wrap = document.getElementById('preview-wrap');
  wrap.innerHTML = '';
  const img = document.createElement('img');
  img.src = url;
  img.style.cssText = 'width:100%;height:100%;display:block;border-radius:16px;';
  wrap.appendChild(img);

  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

  const dlBtn = document.getElementById('dl-btn');
  if (isIOS) {
    document.querySelector('.success-sub').textContent = '长按上方图片 → 存储到"照片"';
    dlBtn.style.display = 'none';
  } else {
    document.querySelector('.success-sub').textContent = '你的高清图片已生成！';
    dlBtn.href = url;
    dlBtn.download = `cipheroptics_${order.theme}_${Date.now()}.${ext}`;
    dlBtn.style.display = 'flex';
  }

  // Helper fns
  function lighten(hex, amt) {
    const r = Math.min(255, parseInt(hex.slice(1,3),16)+amt);
    const g = Math.min(255, parseInt(hex.slice(3,5),16)+amt);
    const b = Math.min(255, parseInt(hex.slice(5,7),16)+amt);
    return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
  }
  function hexRgba(hex, a) {
    const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }
  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
    ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
    ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
    ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
  }
})();
</script>
</body>
</html>
