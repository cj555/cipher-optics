<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optical Cipher Generator | Custom Geek Stickers</title>
    <style>
        :root {
            --bg-color: #0a0b0e;
            --text-color: #e2e8f0;
            --accent-color: #6366f1; /* Morandi Purple */
            --accent-success: #10b981; 
            --card-bg: rgba(30, 32, 40, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
        }

        /* Natively load your local TrueType Font pack */
        @font-face {
            font-family: 'OpticalMorandi';
            src: url('./myfont.ttf') format('truetype');
            font-display: swap;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #0a0b0e 70%);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 650px;
            padding: 40px 20px;
            box-sizing: border-box;
            flex: 1;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2rem;
            letter-spacing: 2px;
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }

        /* Glassmorphism Panel Styling */
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        textarea {
            width: 100%;
            height: 80px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: #fff;
            padding: 12px;
            box-sizing: border-box;
            resize: none;
            font-size: 1.1rem;
            margin-bottom: 20px;
            transition: all 0.3s;
            font-family: monospace;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.2);
        }

        /* Square Sticker Preview Area */
        .preview-box {
            position: relative;
            width: 100%;
            aspect-ratio: 1; 
            background: #050608;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            margin-bottom: 25px;
        }

        /* FORCE preview text wrapper to implement your local ttf */
        .cipher-render-layer {
            font-family: 'OpticalMorandi', monospace, sans-serif !important;
            font-size: 3rem;
            text-align: center;
            word-break: break-all;
            padding: 25px;
            max-width: 90%;
            line-height: 1.3;
            color: #ffffff;
        }

        /* Button Grid Layout */
        .btn-group {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
        }

        /* Free download button for low-res sticker */
        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        /* Premium tier via Stripe Payment Link with client passing token */
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            border: 1px solid var(--border-color);
            font-size: 0.85rem;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        /* Redirection Pop-up Overlay */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 6, 8, 0.85);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #161822;
            border: 1px solid #2a2d3a;
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-title {
            color: var(--accent-success);
            font-size: 1.4rem;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .modal-text {
            color: #94a3b8;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .youtube-btn {
            background: #ff0000;
            color: white;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 30px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
            transition: all 0.2s;
        }

        .youtube-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 0, 0.4);
        }

        .close-btn {
            display: block;
            margin-top: 15px;
            color: #475569;
            font-size: 0.8rem;
            cursor: pointer;
            text-decoration: underline;
        }

        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.8rem;
            color: #475569;
        }
        
        .compliance-links a {
            color: #475569;
            text-decoration: none;
            margin: 0 5px;
        }
        .compliance-links a:hover {
            color: var(--accent-color);
        }
    </style>
</head>
