<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Optical Cipher Studio</title>
  <style>
    :root { --bg-color: #0d0d0d; --panel-color: #1a1a1a; --primary-color: #635bff; --accent-color: #ff4500; }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background-color: var(--bg-color); color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    
    h1 { font-size: 1.5rem; font-weight: 600; margin: 20px 0 10px 0; background: linear-gradient(45deg, #e2cfc4, #b5a4a7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    p.subtitle { color: #888; font-size: 0.85rem; margin-bottom: 30px; }

    .input-container { width: 100%; max-width: 500px; margin-bottom: 25px; }
    input[type="text"] { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #333; background-color: var(--panel-color); color: #fff; font-size: 1.1rem; text-align: center; outline: none; transition: border-color 0.3s; }
    input[type="text"]:focus { border-color: var(--primary-color); }

    /* 预览面板及移动端渲染优化 */
    #preview-box { width: 100%; max-width: 500px; background: var(--panel-color); border-radius: 16px; padding: 25px 15px; display: flex; justify-content: center; align-items: center; min-height: 120px; margin-bottom: 35px; border: 1px solid #222; position: relative; overflow: hidden; }
    #cipher-output { display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 6px; width: 100%; }
    
    /* 移动端无色差矢量渲染尺寸控制 */
    .cipher-icon { width: 45px; height: 45px; transition: transform 0.2s; }
    
    /* 防白嫖机制：未付费状态下预览区加模糊滤镜和动态半透明水印 */
    .locked-preview #cipher-output { filter: blur(2px) grayscale(0.4); opacity: 0.5; pointer-events: none; }
    .watermark { display: none; position: absolute; font-size: 1.8rem; font-weight: 900; color: rgba(255, 255, 255, 0.07); transform: rotate(-15deg); user-select: none; pointer-events: none; letter-spacing: 4px; }
    .locked-preview .watermark { display: block; }

    /* 按钮样式 */
    .action-container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 14px; }
    button { width: 100%; padding: 16px; border-radius: 12px; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
    button:active { transform: scale(0.98); }
    .btn-stripe { background: var(--primary-color); color: #fff; box-shadow: 0 4px 15px rgba(99, 91, 255, 0.3); }
    .btn-free { background: #262626; color: #aaa; border: 1px solid #333; }
    
    #sprite-load-area { display: none; }
  </style>
</head>
<body>

  <h1>光学密文潮流生成器</h1>
  <p class="subtitle">输入英文，自动转换成印刷级莫兰蒂渐变光学元器件矩阵</p>

  <div class="input-container">
    <input type="text" id="text-input" placeholder="输入英文密语 (如 LOVE)..." maxlength="30" autocomplete="off">
  </div>

  <div id="preview-box" class="locked-preview">
    <div class="watermark">PREVIEW ONLY</div>
    <div id="cipher-output"></div>
  </div>

  <div class="action-container">
    <button class="btn-stripe" onclick="payWithStripe()">付 $4.99 下载超清无损矢量图</button>
    <button class="btn-free" onclick="redirectToFreeRoute()">免费下载 (前往 YouTube 频道解密)</button>
  </div>

  <div id="sprite-load-area"></div>

  <script>
    const input = document.getElementById('text-input');
    const output = document.getElementById('cipher-output');

    // 页面初始化时，纯前端异步预加载雪碧图库，解决移动端并行加载网络请求阻塞与画布渲染白框死穴
    window.addEventListener('DOMContentLoaded', () => {
      fetch('/public/sprite.svg')
        .then(response => response.text())
        .then(svgText => {
          document.getElementById('sprite-load-area').innerHTML = svgText;
        }).catch(err => console.error("雪碧图加载失败:", err));
    });

    // 实时监听输入，建立高速 SVG `<use>` 原生链映射
    input.addEventListener('input', (e) => {
      let text = e.target.value.toUpperCase(); // 强制转换为大写增强器件一致性（可根据自身映射修改）
      input.value = text;
      output.innerHTML = '';

      if(!text) return;

      for (let i = 0; i < text.length; i++) {
        const asciiCode = text.charCodeAt(i);
        // 通过 use href 锚点动态调取内存中的雪碧图节点，100% 满帧、矢量缩放不失真
        const svgNode = `
          <svg class="cipher-icon" viewBox="0 0 100 100">
            <use href="#char-${asciiCode}"></use>
          </svg>
        `;
        output.innerHTML += svgNode;
      }
    });

    // 渠道 1：Stripe 付费无损原图导出通道
    function payWithStripe() {
      const textVal = input.value.trim();
      if (!textVal) return alert("请先输入需要加密的密文！");
      
      // 使用 base64 混淆字符数据，作为 client_reference_id 穿透给 Stripe Checkout
      const encodedText = btoa(encodeURIComponent(textVal));
      
      // 重定向至你的 Stripe 专属 Checkout 托管支付链接
      window.location.href = `https://buy.stripe.com/test_aFaeVcfR17IZfeUd0WcIE00?client_reference_id=${encodedText}`;
    }

    // 渠道 2：免费通道 —— 强制跳 YouTube 主页，延时在原窗口下发带水印的低画质图
    function redirectToFreeRoute() {
      const textVal = input.value.trim();
      if (!textVal) return alert("请先输入需要加密的密文！");

      alert("感谢支持！系统正在为您跳转 YouTube 官方解密主页。请不要关闭当前网页，看完视频返回后将自动下载。");

      // 在新标签页打开 YouTube 频道刷视频完播率与播放权重
      window.open('https://www.youtube.com/@你的频道主页', '_blank');

      // 留在本App的当前窗口，延迟 3 秒后触发带有降质、模糊以及水印的低清图片导出
      setTimeout(() => {
        generateAndDownloadSVG({ isHighRes: false, text: textVal });
      }, 3000);
    }

    // 工业级：纯前端 SVG 路径深度重组与提取引擎
    function generateAndDownloadSVG({ isHighRes, text }) {
      if(!text) return;
      
      let combinedContent = '';
      const charWidth = 100; // 单个字符在矢量画布里的基准宽度
      const totalWidth = text.length * charWidth;

      // 深度遍历当前文本，抓取内联雪碧图里的原始矢量定义，进行物理合并，断开外部引用依赖
      for (let i = 0; i < text.length; i++) {
        const asciiCode = text.charCodeAt(i);
        const symbolNode = document.getElementById(`char-${asciiCode}`);
        
        if (symbolNode) {
          // 抓取原本提取到的 <symbol> 内部纯路径代码
          let innerContent = symbolNode.innerHTML;
          // 利用 translate 矩阵进行 X 轴完美横向等距排布
          combinedContent += `<g transform="translate(${i * charWidth}, 0)">${innerContent}</g>`;
        }
      }

      // 如果是免费版本，动态注入一行明文防伪水印路径，破坏印厂直接印刷的可能
      if (!isHighRes) {
        combinedContent += `
          <text x="50%" y="85%" font-family="sans-serif" font-size="28" fill="rgba(255,255,255,0.2)" 
          text-anchor="middle" font-weight="bold" letter-spacing="2">FREE PREVIEW ONLY</text>
        `;
      }

      // 动态合成一个完整、独立、无外部依赖的超级矢量 SVG 文件
      // 付费版（HighRes）输出 3000px 级别的印刷级图，免费版缩减尺寸
      const finalWidth = isHighRes ? 3000 : 600;
      const finalHeight = isHighRes ? 1000 : 200;
      
      const svgWrapper = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${totalWidth} 100" width="${finalWidth}" height="${finalHeight}" style="background:#000;">
          ${combinedContent}
        </svg>
      `;

      // 转换为前端二进制 Blob 流实现零延迟静默下载
      const blob = new Blob([svgWrapper], { type: 'image/svg+xml;charset=utf-8' });
      const blobUrl = URL.createObjectURL(blob);

      const downloadAnchor = document.createElement('a');
      downloadAnchor.href = blobUrl;
      downloadAnchor.download = isHighRes ? `HD-Optical-Cipher-${Date.now()}.svg` : `Free-Preview-Cipher.svg`;
      document.body.appendChild(downloadAnchor);
      downloadAnchor.click();
      
      // 释放内存内存指针
      document.body.removeChild(downloadAnchor);
      URL.revokeObjectURL(blobUrl);
    }
    
    // 暴露出下载方法供 success.html 跨端调用
    window.pureFrontendDownloadTrigger = generateAndDownloadSVG;
  </script>
</body>
</html>
